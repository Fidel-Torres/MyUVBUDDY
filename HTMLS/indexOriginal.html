<!DOCTYPE html>
<html>
<head>
  <title>UV Buddy Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; padding: 1.5rem; background: #fffdf7; color: #2C2C2A; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 40px; height: 40px; border-radius: 50%; background: #FAEEDA; display: flex; align-items: center; justify-content: center; }
    .logo i { font-size: 20px; color: #BA7517; }
    .title { font-size: 20px; font-weight: 500; }
    .subtitle { font-size: 13px; color: #888780; margin-top: 2px; }

    .connect-btn { display: flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 8px; border: 0.5px solid #EF9F27; background: #FAEEDA; color: #854F0B; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .connect-btn:hover { background: #FAC775; }
    .connect-btn.connected { background: #EAF3DE; border-color: #639922; color: #3B6D11; }

    .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; background: #f5f4ef; border: 0.5px solid rgba(0,0,0,0.08); margin-bottom: 1rem; font-size: 13px; color: #888780; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #B4B2A9; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.live { background: #639922; box-shadow: 0 0 0 3px #EAF3DE; }
    .status-dot.connecting { background: #EF9F27; box-shadow: 0 0 0 3px #FAEEDA; }

    .alert-bar { display: none; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #F5C4B3; background: #FAECE7; color: #712B13; font-size: 13px; font-weight: 500; margin-bottom: 1rem; }
    .alert-bar.visible { display: flex; }
    .alert-bar i { font-size: 16px; }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .metric { background: #f5f4ef; border-radius: 8px; padding: 1rem; }
    .metric-label { font-size: 12px; color: #888780; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .metric-label i { font-size: 14px; }
    .metric-value { font-size: 26px; font-weight: 500; }
    .metric-sub { font-size: 12px; color: #888780; margin-top: 4px; }
    .uvi-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-top: 6px; }

    .card { background: #ffffff; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .card-title { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .card-title i { font-size: 16px; color: #EF9F27; }
    .card-hint { font-size: 12px; color: #888780; }

    .log-list { font-size: 13px; font-family: monospace; }
    .log-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.06); flex-wrap: wrap; }
    .log-row:last-child { border-bottom: none; }
    .log-time { color: #888780; flex-shrink: 0; min-width: 58px; }
    .log-uv { color: #BA7517; font-weight: 500; }
    .log-light { color: #185FA5; font-weight: 500; }

    .empty { text-align: center; padding: 2rem; color: #888780; font-size: 14px; }
    .empty i { font-size: 32px; display: block; margin-bottom: 8px; color: #FAC775; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo"><i class="ti ti-sun"></i></div>
    <div>
      <div class="title">UV Buddy</div>
      <div class="subtitle">LTR390 BLE Dashboard</div>
    </div>
  </div>
  <button class="connect-btn" id="connectBtn" onclick="toggleConnect()">
    <i class="ti ti-bluetooth" id="btnIcon"></i>
    <span id="btnLabel">Connect</span>
  </button>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Disconnected - press Connect to scan for MYUVBUDDY</span>
</div>

<div class="alert-bar" id="alertBar">
  <i class="ti ti-alert-triangle"></i>
  <span id="alertText">UVI above threshold</span>
</div>

<div class="metrics">
  <div class="metric">
    <div class="metric-label"><i class="ti ti-sun"></i> UV index</div>
    <div><span class="metric-value" id="metUVI">-</span></div>
    <div id="uviBadge"></div>
  </div>
  <div class="metric">
    <div class="metric-label"><i class="ti ti-brightness"></i> Ambient light</div>
    <div><span class="metric-value" id="metLUX">-</span></div>
    <div class="metric-sub">lux</div>
  </div>
  <div class="metric">
    <div class="metric-label"><i class="ti ti-sun"></i> UV raw</div>
    <div><span class="metric-value" id="metUVS">-</span></div>
    <div class="metric-sub">counts</div>
  </div>
  <div class="metric">
    <div class="metric-label"><i class="ti ti-clock"></i> Samples</div>
    <div><span class="metric-value" id="metCount">0</span></div>
    <div class="metric-sub" id="metSince">-</div>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-chart-line"></i> UV index over time</div>
    <div class="card-hint" id="chartHint">last 50 readings</div>
  </div>
  <div style="position: relative; width: 100%; height: 200px;">
    <canvas id="uvChart" role="img" aria-label="Line chart of UV index and lux over time">No data yet.</canvas>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <div class="card-title"><i class="ti ti-list"></i> Recent readings</div>
    <div class="card-hint">newest first</div>
  </div>
  <div id="logList" class="log-list">
    <div class="empty">
      <i class="ti ti-sun-off"></i>
      No data yet - connect your device
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SERVICE_UUID        = '4880c12c-fdcb-4077-8920-a450d7f9b907';
const CHARACTERISTIC_UUID = 'fec26ec4-6d71-4442-9f81-55bc21d658d6';
const MAX_CHART_POINTS    = 50;
const MAX_LOG_ROWS        = 20;

// UVI level labels only - no math, values come from device
const UVI_LEVELS = [
  { max: 2,        label: 'Low',       bg: '#EAF3DE', color: '#3B6D11' },
  { max: 5,        label: 'Moderate',  bg: '#FAEEDA', color: '#854F0B' },
  { max: 7,        label: 'High',      bg: '#FAC775', color: '#633806' },
  { max: 10,       label: 'Very high', bg: '#F5C4B3', color: '#712B13' },
  { max: Infinity, label: 'Extreme',   bg: '#F4C0D1', color: '#72243E' }
];

function uviLevel(uvi) {
  return UVI_LEVELS.find(l => uvi <= l.max);
}

let characteristic = null;
let connected      = false;
let history        = JSON.parse(localStorage.getItem('uvbuddy_history') || '[]');
let sessionStart   = null;

// -----------------------------------------------------------------------------
// Chart
// -----------------------------------------------------------------------------

const ctx = document.getElementById('uvChart').getContext('2d');
const uvChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'UVI',
      data: [],
      borderColor: '#EF9F27',
      backgroundColor: 'rgba(239,159,39,0.10)',
      borderWidth: 2,
      pointBackgroundColor: '#EF9F27',
      pointRadius: 3,
      fill: true,
      tension: 0.35
    },{
      label: 'Lux',
      data: [],
      borderColor: '#378ADD',
      backgroundColor: 'rgba(55,138,221,0.07)',
      borderWidth: 1.5,
      pointBackgroundColor: '#378ADD',
      pointRadius: 2,
      fill: true,
      tension: 0.35,
      borderDash: [4, 3],
      yAxisID: 'y2'
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: c => c.datasetIndex === 0
            ? `UVI: ${c.parsed.y}`
            : `Lux: ${c.parsed.y}`
        }
      }
    },
    scales: {
      x: {
        ticks: { maxTicksLimit: 8, font: { size: 11 }, color: '#888780', maxRotation: 0 },
        grid: { color: 'rgba(136,135,128,0.12)' }
      },
      y: {
        title: { display: true, text: 'UVI', font: { size: 11 }, color: '#888780' },
        ticks: { font: { size: 11 }, color: '#888780' },
        grid: { color: 'rgba(136,135,128,0.12)' }
      },
      y2: {
        position: 'right',
        title: { display: true, text: 'Lux', font: { size: 11 }, color: '#378ADD' },
        ticks: { font: { size: 11 }, color: '#378ADD' },
        grid: { drawOnChartArea: false }
      }
    }
  }
});

// -----------------------------------------------------------------------------
// Status helpers
// -----------------------------------------------------------------------------

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot'
    + (state === 'live' ? ' live' : state === 'connecting' ? ' connecting' : '');
  document.getElementById('statusText').textContent = text;
}

function setAlert(active, text) {
  const bar = document.getElementById('alertBar');
  bar.className = 'alert-bar' + (active ? ' visible' : '');
  if (text) document.getElementById('alertText').textContent = text;
}

// -----------------------------------------------------------------------------
// Message parser - reads values directly from device, no conversion
// Handles both data messages and alert messages
// -----------------------------------------------------------------------------

function parseMsg(raw) {
  // Alert messages from threshold interrupt
  if (raw.includes('ALERT=')) {
    if (raw.includes('ALERT=UVI_HIGH')) setAlert(true,  'UVI above threshold - seek shade');
    if (raw.includes('ALERT=UVI_OK'))   setAlert(false, '');
    return null;
  }

  // Error from device
  if (raw.includes('ERR=')) {
    setStatus('live', 'Sensor error received from device');
    return null;
  }

  // Normal data: "UVI=x.x LUX=x.x UV=xxxxx"
  const uviMatch = raw.match(/UVI=([\d.]+)/);
  const luxMatch = raw.match(/LUX=([\d.]+)/);
  const uvMatch  = raw.match(/UV=(\d+)/);

  if (!uviMatch || !luxMatch || !uvMatch) return null;

  return {
    uvi: parseFloat(uviMatch[1]),
    lux: parseFloat(luxMatch[1]),
    uvs: parseInt(uvMatch[1])
  };
}

// -----------------------------------------------------------------------------
// Data handling
// -----------------------------------------------------------------------------

function addReading(parsed) {
  const now   = new Date();
  const entry = {
    ts:  now.toISOString(),
    uvi: parsed.uvi,
    lux: parsed.lux,
    uvs: parsed.uvs
  };

  history.unshift(entry);
  if (history.length > 500) history.pop();
  localStorage.setItem('uvbuddy_history', JSON.stringify(history));

  if (!sessionStart) sessionStart = now;

  updateMetrics(entry);
  updateChart();
  updateLog();
}

function updateMetrics(entry) {
  const level = uviLevel(entry.uvi);

  document.getElementById('metUVI').textContent   = entry.uvi.toFixed(1);
  document.getElementById('metLUX').textContent   = entry.lux.toFixed(1);
  document.getElementById('metUVS').textContent   = entry.uvs;
  document.getElementById('metCount').textContent = history.length;
  document.getElementById('metSince').textContent = sessionStart
    ? 'since ' + sessionStart.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '-';

  document.getElementById('uviBadge').innerHTML =
    `<span class="uvi-badge" style="background:${level.bg};color:${level.color}">${level.label}</span>`;
}

function updateChart() {
  const slice  = history.slice(0, MAX_CHART_POINTS).reverse();
  const labels = slice.map(e =>
    new Date(e.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })
  );
  uvChart.data.labels           = labels;
  uvChart.data.datasets[0].data = slice.map(e => e.uvi);
  uvChart.data.datasets[1].data = slice.map(e => e.lux);
  document.getElementById('chartHint').textContent = `last ${slice.length} readings`;
  uvChart.update('none');
}

function updateLog() {
  const rows = history.slice(0, MAX_LOG_ROWS);
  if (!rows.length) return;

  document.getElementById('logList').innerHTML = rows.map(r => {
    const t     = new Date(r.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const level = uviLevel(r.uvi);
    return `<div class="log-row">
      <span class="log-time">${t}</span>
      <span class="log-uv"><i class="ti ti-sun" style="font-size:13px"></i> UVI ${r.uvi.toFixed(1)}</span>
      <span class="log-light"><i class="ti ti-brightness" style="font-size:13px"></i> ${r.lux.toFixed(1)} lux</span>
      <span class="uvi-badge" style="background:${level.bg};color:${level.color};font-size:11px">${level.label}</span>
    </div>`;
  }).join('');
}

// -----------------------------------------------------------------------------
// BLE connection
// -----------------------------------------------------------------------------

async function toggleConnect() {
  if (connected) {
    if (characteristic) {
      try { await characteristic.stopNotifications(); } catch(e) {}
    }
    characteristic = null;
    connected = false;
    setStatus('off', 'Disconnected');
    setAlert(false, '');
    document.getElementById('connectBtn').className = 'connect-btn';
    document.getElementById('btnIcon').className    = 'ti ti-bluetooth';
    document.getElementById('btnLabel').textContent = 'Connect';
    return;
  }

  setStatus('connecting', 'Scanning...');
  document.getElementById('btnLabel').textContent = 'Scanning...';

  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    setStatus('connecting', 'Connecting to ' + device.name + '...');

    const server   = await device.gatt.connect();
    const service  = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

    await characteristic.startNotifications();
    characteristic.addEventListener('characteristicvaluechanged', e => {
      const raw    = new TextDecoder().decode(e.target.value);
      const parsed = parseMsg(raw);
      if (parsed) addReading(parsed);
    });

    device.addEventListener('gattserverdisconnected', () => {
      connected = false;
      setStatus('off', 'Device disconnected');
      setAlert(false, '');
      document.getElementById('connectBtn').className = 'connect-btn';
      document.getElementById('btnIcon').className    = 'ti ti-bluetooth';
      document.getElementById('btnLabel').textContent = 'Connect';
    });

    connected = true;
    setStatus('live', 'Connected to ' + device.name + ' - receiving data');
    document.getElementById('connectBtn').className = 'connect-btn connected';
    document.getElementById('btnIcon').className    = 'ti ti-bluetooth-connected';
    document.getElementById('btnLabel').textContent = 'Disconnect';

  } catch(err) {
    setStatus('off', 'Error: ' + err.message);
    document.getElementById('btnLabel').textContent = 'Connect';
  }
}

// Restore history on load
if (history.length) {
  updateChart();
  updateLog();
  updateMetrics(history[0]);
}
</script>

</body>
</html>
